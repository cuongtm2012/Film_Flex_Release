# Production Nginx site config for phimgg.com
# Copy to server: /etc/nginx/conf.d/default.conf
# Cần có file limit_req_zones.conf trong conf.d/ (chứa limit_req_zone trong http context).

# HTTP -> HTTPS + Let's Encrypt
server {
    listen 80;
    listen [::]:80;
    server_name phimgg.com www.phimgg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - frontend từ /var/www/filmflex/dist/public + proxy API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phimgg.com www.phimgg.com;

    ssl_certificate     /etc/letsencrypt/live/phimgg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phimgg.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin, Cache-Control, Pragma" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "1728000" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    access_log /var/log/nginx/phimgg.com.access.log;
    error_log  /var/log/nginx/phimgg.com.error.log warn;

    root /var/www/filmflex/dist/public;

    # Sitemap at root (standard) -> redirect to API sitemap index
    location = /sitemap.xml {
        return 302 $scheme://$host/api/sitemap-index.xml;
    }

    # Assets - ưu tiên serve với MIME đúng, cache 1 năm (file có hash)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    location / {
        if ($request_method = 'OPTIONS') {
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        limit_req zone=general burst=10 nodelay;
        try_files $uri $uri/ /index.html @backend;
        add_header X-Cache-Status "SPA";
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header X-Cache-Status "API-PROXIED";
    }

    location @backend {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header X-Cache-Status "BACKEND";
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
        add_header X-Cache-Status "HEALTH";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
